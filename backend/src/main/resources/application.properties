# ---- Email (Gmail SMTP) ----
# Fill in a Gmail address and a 16-char Gmail "App Password" (NOT the normal password).
# Requires 2-Step Verification on the Google account. Until filled in, emails are logged, not sent.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${CINJA_MAIL_USERNAME:PASTE_YOUR_GMAIL_ADDRESS_HERE}
spring.mail.password=${CINJA_MAIL_PASSWORD:PASTE_YOUR_GMAIL_APP_PASSWORD_HERE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Base URL used to build the links inside the emails (the demo machine running the app)
app.base-url=http://localhost:8080
